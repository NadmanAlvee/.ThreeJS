<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three JS Test</title>
   <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
    }

    canvas {
      display: block; 
      max-width: 100vw;
      max-height: 100vh;
    }

    .loading-progress-container {
      display: block;
      position: absolute;
      z-index: 1000;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      height: 100%;
      width: 100%;
      background-color: rgba(0, 0, 0, 1);
      display: flex ;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 1s ease;
    }

    .loading-progress-bar {
      font-size: 2rem;
      color: white;
    }

    #progress-bar {
      width: 30%;
      height: 2%;
      margin-top: 0.5%;
    }
  </style>
</head>
<body>
  <div class="loading-progress-container">
    <label class="loading-progress-bar">Loading... </label>
    <progress id="progress-bar" value="0" max="100"></progress>
  </div>
  <script src="./js/index.js" type="module"></script>
</body>
</html>
