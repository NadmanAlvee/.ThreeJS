<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three JS Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
    }

    canvas {
      display: block; 
      max-width: 100vw;
      max-height: 100vh;
    }

    .tooltip {
      position: absolute;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      opacity: 0;
      transition-duration: 0.3s;
      transition-property: opacity, transform;
    }

    .show {
      opacity: 1;
      transform: translateX(0);
    }

    .hide {
      opacity: 0;
      transform: translateX(10px);
    }

    .carLabel {
      position: absolute;
      white-space: nowrap;
      background: rgba(0, 0, 0, 0.3);
      color: white;
      padding: 10px;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <script src="./js/index.js" type="module"></script>
</body>
</html>
